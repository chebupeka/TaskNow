name: tasknow

services:
  postgres:
    image: postgres:16
    container_name: tasknow-postgres
    environment:
      POSTGRES_DB: tasknow
      POSTGRES_USER: tasknow
      POSTGRES_PASSWORD: tasknow
    ports:
      - "5433:5432"
    volumes:
      - tasknow_postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasknow -d tasknow"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  tasknow_postgres_data:
